name: Validate and deploy Pacefold 15.6.0

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reconstruct verified release
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          echo "50c4c2787300102704d577e6e221909e307866522d59422d13871a55085d63e7  /tmp/pacefold-v15.zip" | sha256sum -c -
          mkdir _release
          unzip -q /tmp/pacefold-v15.zip -d _release
      - name: Require a core or Notebook version advance
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          base_sha="$PR_BASE_SHA"
          if [ -z "$base_sha" ] || [ "$base_sha" = "null" ]; then base_sha="$PUSH_BEFORE_SHA"; fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then base_sha=$(git rev-parse HEAD^); fi
          git ls-tree -r --name-only "$base_sha" release | grep '\.zip\.b64\.part-' | sort > /tmp/previous-parts.txt
          test -s /tmp/previous-parts.txt
          while IFS= read -r part; do git show "${base_sha}:${part}"; done < /tmp/previous-parts.txt | base64 --decode > /tmp/pacefold-previous.zip
          mkdir _previous
          unzip -q /tmp/pacefold-previous.zip -d _previous
          current_core=$(sed -n "s/.*const APP_VERSION='\([^']*\)'.*/\1/p" _release/app/app.js | head -n 1)
          previous_core=$(sed -n "s/.*const APP_VERSION='\([^']*\)'.*/\1/p" _previous/app/app.js | head -n 1)
          current_surface=$(cat enhancements/VERSION)
          previous_surface=$(git show "${base_sha}:enhancements/VERSION" 2>/dev/null || true)
          test -n "$current_core"
          test -n "$previous_core"
          test -n "$current_surface"
          if [ "$current_core" = "$previous_core" ]; then
            test "$current_surface" != "$previous_surface"
            echo "Notebook version advanced: ${previous_surface:-none} -> $current_surface (core remains $current_core)"
          else
            echo "Core version advanced: $previous_core -> $current_core; Notebook $current_surface"
          fi
      - name: JavaScript and compressed-source syntax
        run: |
          node --check _release/app/app.js
          node --check _release/app/auth.js
          node --check _release/site.js
          node --check _release/service-worker.js
          node --check _release/app/service-worker.js
          node --check _release/scripts/browser-audit.cjs
          node --check enhancements/pacefold-hub.js
          node --check enhancements/pacefold-hub-guardian.js
          node --check enhancements/inject.mjs
          node --check enhancements/hub-audit.cjs
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-00)" = "9ee4b39abd4e009ccd51b1f0a1d63ca355b1e38e"
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-01a)" = "965b37f16fca294619bd2ab1026fa3b994fe41e4"
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-01b)" = "218fbe2ab562da27c9bd8cc1867d0749ee989566"
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-01c)" = "fc9b50bc875cc1bd2a5d8c8bf19e0f2775cbfe4a"
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-01d)" = "b1241ec0538977f91a97d7e7f74f2d10c4391d99"
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-02)" = "2fed7d603cd98dc9ead13d3fa31041c785d08992"
          test "$(git hash-object enhancements/pacefold-hub.js.gz.b64.part-03)" = "11475bc120387ecf1cbf16dc8038aa5401d7db72"
          node -e "const fs=require('fs'),z=require('zlib'),p='enhancements/';const names=['pacefold-hub.js.gz.b64.part-00','pacefold-hub.js.gz.b64.part-01a','pacefold-hub.js.gz.b64.part-01b','pacefold-hub.js.gz.b64.part-01c','pacefold-hub.js.gz.b64.part-01d','pacefold-hub.js.gz.b64.part-02','pacefold-hub.js.gz.b64.part-03'];const encoded=names.map(n=>fs.readFileSync(p+n,'utf8')).join('').replace(/\\s+/g,'');fs.writeFileSync('/tmp/pacefold-notebook.js',z.gunzipSync(Buffer.from(encoded,'base64')))"
          node --check /tmp/pacefold-notebook.js
          node -e "const fs=require('fs'),z=require('zlib');const css=z.gunzipSync(Buffer.from(fs.readFileSync('enhancements/pacefold-hub.css.gz.b64','utf8').replace(/\\s+/g,''),'base64'));if(!css.length)process.exit(1)"
      - name: Build and static audit
        run: |
          node _release/scripts/build.mjs _release
          node _release/scripts/validate.mjs _release
      - name: Browser application, action and installed-upgrade audit
        run: |
          npm install --prefix /tmp/pacefold-browser-audit playwright@1.61.1
          /tmp/pacefold-browser-audit/node_modules/.bin/playwright install --with-deps chromium
          NODE_PATH=/tmp/pacefold-browser-audit/node_modules node _release/scripts/browser-audit.cjs _release _previous
      - name: Inject and audit Notebook surface
        run: |
          node enhancements/inject.mjs _release
          test "$(cat _release/pacefold-hub-version.txt)" = "$(cat enhancements/VERSION)"
          ! grep -q 'data-pacefold-hub=' _release/index.html
          grep -q 'data-pacefold-hub="15.6.0"' _release/app/index.html
          grep -q 'https://api.open-meteo.com' _release/app/index.html
          grep -q 'https://graph.microsoft.com' _release/app/index.html
          grep -q 'https://www.youtube-nocookie.com' _release/app/index.html
          grep -q 'https://open.spotify.com' _release/app/index.html
          grep -q 'https://music.amazon.ca' _release/app/index.html
          test -f _release/app/icons/fold-mark.svg
          test -f _release/app/icons/notify-water.svg
          test ! -e _release/pacefold-hub.js
          node --check _release/app/pacefold-hub.js
          ! grep -q 'allow-popups-to-escape-sandbox' _release/app/pacefold-hub.js
          node --check _release/app/pacefold-hub-guardian.js
          node --check _release/service-worker.js
          node --check _release/app/service-worker.js
          NODE_PATH=/tmp/pacefold-browser-audit/node_modules node enhancements/hub-audit.cjs _release
      - name: Upload Notebook failure detail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pacefold-notebook-failure
          path: /tmp/pacefold-notebook-audit-failure.txt
          if-no-files-found: ignore
          retention-days: 1

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Reconstruct verified release and install Notebook surface
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          echo "50c4c2787300102704d577e6e221909e307866522d59422d13871a55085d63e7  /tmp/pacefold-v15.zip" | sha256sum -c -
          mkdir _release _site
          unzip -q /tmp/pacefold-v15.zip -d _release
          node _release/scripts/build.mjs _release
          node _release/scripts/validate.mjs _release
          rsync -a _release/ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'scripts/' \
            --exclude 'README.md' \
            --exclude 'CHANGELOG.md' \
            --exclude 'REPOSITORY_SETUP.md' \
            --exclude 'SECURITY.md'
          node enhancements/inject.mjs _site
          test "$(cat _site/pacefold-hub-version.txt)" = "$(cat enhancements/VERSION)"
          ! grep -q 'data-pacefold-hub=' _site/index.html
          grep -q 'data-pacefold-hub="15.6.0"' _site/app/index.html
          grep -q 'https://graph.microsoft.com' _site/app/index.html
          test -f _site/app/icons/fold-mark.svg
          test -f _site/app/icons/notify-water.svg
          test ! -e _site/pacefold-hub.js
          node --check _site/app/pacefold-hub.js
          ! grep -q 'allow-popups-to-escape-sandbox' _site/app/pacefold-hub.js
          node --check _site/app/pacefold-hub-guardian.js
          node --check _site/service-worker.js
          node --check _site/app/service-worker.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
