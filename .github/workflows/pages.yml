name: Agent harden verified Pacefold core

on:
  push:
    branches: [agent/pacefold-function-hardening]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pacefold-agent-hardening
  cancel-in-progress: true

jobs:
  harden:
    if: github.repository == 'rbt4/pacefold' && (github.ref == 'refs/heads/agent/pacefold-function-hardening' || github.event.pull_request.head.ref == 'agent/pacefold-function-hardening')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@v6
        with:
          ref: agent/pacefold-function-hardening
          fetch-depth: 0

      - name: Restore production workflow
        run: |
          git show origin/main:.github/workflows/pages.yml > /tmp/pages.yml
          test -s /tmp/pages.yml
          mv /tmp/pages.yml .github/workflows/pages.yml

      - name: Verify sealed archive
        run: |
          rm -rf _agent_core /tmp/pacefold-previous /tmp/pacefold-current /tmp/pacefold-site
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          expected="$(sed -n 's/^- SHA-256: `\([a-f0-9]\{64\}\)`.*/\1/p' RELEASE.md)"
          echo "Expected archive SHA: $expected"
          test -n "$expected"
          echo "$expected  /tmp/pacefold-v15.zip" | sha256sum -c -

      - name: Reconstruct source trees
        run: |
          mkdir _agent_core /tmp/pacefold-previous
          unzip -q /tmp/pacefold-v15.zip -d _agent_core
          unzip -q /tmp/pacefold-v15.zip -d /tmp/pacefold-previous
          test -f _agent_core/app/app.js
          test -f /tmp/pacefold-previous/app/app.js

      - name: Assemble migration
        run: |
          ls -l .agent/harden-core.part-*
          cat .agent/harden-core.part-* > scripts/harden-core.mjs
          node --check scripts/harden-core.mjs

      - name: Harden core, injector and repository
        run: |
          node scripts/harden-core.mjs _agent_core 15.2.1 15.2.2
          node scripts/harden-repo.mjs .
          node --check _agent_core/app/app.js
          node --check _agent_core/service-worker.js
          node --check enhancements/inject.mjs

      - name: Pack and verify release
        run: |
          node scripts/pack.mjs . _agent_core
          node scripts/verify.mjs .

      - name: Prepare browser audit builds
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-current.zip
          mkdir /tmp/pacefold-current /tmp/pacefold-site
          unzip -q /tmp/pacefold-current.zip -d /tmp/pacefold-current
          cp -a /tmp/pacefold-current/. /tmp/pacefold-site/
          PACEFOLD_DEBUG=1 node /tmp/pacefold-current/scripts/build.mjs /tmp/pacefold-current
          node enhancements/inject.mjs /tmp/pacefold-site

      - name: Install browser audit runtime
        run: |
          npm install --prefix /tmp/pacefold-browser-audit playwright@1.61.1
          /tmp/pacefold-browser-audit/node_modules/.bin/playwright install --with-deps chromium

      - name: Run core and enhancement browser audits
        env:
          NODE_PATH: /tmp/pacefold-browser-audit/node_modules
        run: |
          node /tmp/pacefold-current/scripts/browser-audit.cjs /tmp/pacefold-current /tmp/pacefold-previous
          node enhancements/run-hub-audit.cjs /tmp/pacefold-site
          node enhancements/resilience-audit.cjs /tmp/pacefold-site /tmp/pacefold-resilience-artifacts
          node enhancements/integrated-audit.cjs /tmp/pacefold-site /tmp/pacefold-integrated-artifacts

      - name: Commit only verified outputs
        if: github.event_name == 'push'
        run: |
          rm -rf _agent_core .agent .agent-materialize-trigger .github/workflows/agent-materialize.yml
          git config user.name pacefold-agent
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Harden Pacefold function security and release pipeline"
          git push origin HEAD:agent/pacefold-function-hardening
