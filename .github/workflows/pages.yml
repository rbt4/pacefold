name: Validate and deploy Pacefold 15.1.4

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Reconstruct verified release
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          echo "bb3c8c6a0e949e7480460beb2028457e95cc84132fd86f6720c0c6d56e622b92  /tmp/pacefold-v15.zip" | sha256sum -c -
          mkdir _release
          unzip -q /tmp/pacefold-v15.zip -d _release
      - name: Reconstruct previous release and require a version advance
        run: |
          git ls-tree -r --name-only HEAD^ release | grep '\.zip\.b64\.part-' | sort > /tmp/previous-parts.txt
          test -s /tmp/previous-parts.txt
          while IFS= read -r part; do git show "HEAD^:${part}"; done < /tmp/previous-parts.txt | base64 --decode > /tmp/pacefold-previous.zip
          mkdir _previous
          unzip -q /tmp/pacefold-previous.zip -d _previous
          current_version=$(sed -n "s/.*const APP_VERSION='\([^']*\)'.*/\1/p" _release/app/app.js | head -n 1)
          previous_version=$(sed -n "s/.*const APP_VERSION='\([^']*\)'.*/\1/p" _previous/app/app.js | head -n 1)
          test -n "$current_version"
          test -n "$previous_version"
          test "$current_version" != "$previous_version"
          echo "Release version advanced: $previous_version -> $current_version"
      - name: JavaScript syntax
        run: |
          node --check _release/app/app.js
          node --check _release/app/auth.js
          node --check _release/site.js
          node --check _release/service-worker.js
          node --check _release/app/service-worker.js
          node --check _release/scripts/browser-audit.cjs
      - name: Build and static audit
        run: |
          node _release/scripts/build.mjs _release
          node _release/scripts/validate.mjs _release
      - name: Browser application, action and installed-upgrade audit
        run: |
          npm install --prefix /tmp/pacefold-browser-audit playwright@1.61.1
          /tmp/pacefold-browser-audit/node_modules/.bin/playwright install --with-deps chromium
          NODE_PATH=/tmp/pacefold-browser-audit/node_modules node _release/scripts/browser-audit.cjs _release _previous

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Reconstruct verified release
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          echo "bb3c8c6a0e949e7480460beb2028457e95cc84132fd86f6720c0c6d56e622b92  /tmp/pacefold-v15.zip" | sha256sum -c -
          mkdir _release _site
          unzip -q /tmp/pacefold-v15.zip -d _release
          node _release/scripts/build.mjs _release
          node _release/scripts/validate.mjs _release
          rsync -a _release/ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'scripts/' \
            --exclude 'README.md' \
            --exclude 'CHANGELOG.md' \
            --exclude 'REPOSITORY_SETUP.md' \
            --exclude 'SECURITY.md'
          node _release/scripts/validate.mjs _site
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
