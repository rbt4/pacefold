name: Deploy Pacefold to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Extract tested release
        run: unzip -q pacefold-site.zip -d _site
      - name: Validate static application
        run: |
          test -f _site/index.html
          test -f _site/app/index.html
          test -f _site/app/app.css
          test -f _site/app/app.js
          test -f _site/app/service-worker.js
          test -f _site/app/manifest.webmanifest
          python -m json.tool _site/app/manifest.webmanifest > /dev/null
          node --check _site/app/app.js
          node --check _site/app/service-worker.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
