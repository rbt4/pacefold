name: Validate and deploy Pacefold 15.3.0

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reconstruct verified release
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          echo "50c4c2787300102704d577e6e221909e307866522d59422d13871a55085d63e7  /tmp/pacefold-v15.zip" | sha256sum -c -
          mkdir _release
          unzip -q /tmp/pacefold-v15.zip -d _release
      - name: Require a core or Hub version advance
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          base_sha="$PR_BASE_SHA"
          if [ -z "$base_sha" ] || [ "$base_sha" = "null" ]; then base_sha="$PUSH_BEFORE_SHA"; fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then base_sha=$(git rev-parse HEAD^); fi

          git ls-tree -r --name-only "$base_sha" release | grep '\.zip\.b64\.part-' | sort > /tmp/previous-parts.txt
          test -s /tmp/previous-parts.txt
          while IFS= read -r part; do git show "${base_sha}:${part}"; done < /tmp/previous-parts.txt | base64 --decode > /tmp/pacefold-previous.zip
          mkdir _previous
          unzip -q /tmp/pacefold-previous.zip -d _previous

          current_core=$(sed -n "s/.*const APP_VERSION='\([^']*\)'.*/\1/p" _release/app/app.js | head -n 1)
          previous_core=$(sed -n "s/.*const APP_VERSION='\([^']*\)'.*/\1/p" _previous/app/app.js | head -n 1)
          current_hub=$(cat enhancements/VERSION)
          previous_hub=$(git show "${base_sha}:enhancements/VERSION" 2>/dev/null || true)

          test -n "$current_core"
          test -n "$previous_core"
          test -n "$current_hub"
          if [ "$current_core" = "$previous_core" ]; then
            test "$current_hub" != "$previous_hub"
            echo "Hub version advanced: ${previous_hub:-none} -> $current_hub (core remains $current_core)"
          else
            echo "Core version advanced: $previous_core -> $current_core; Hub $current_hub"
          fi
      - name: JavaScript syntax
        run: |
          node --check _release/app/app.js
          node --check _release/app/auth.js
          node --check _release/site.js
          node --check _release/service-worker.js
          node --check _release/app/service-worker.js
          node --check _release/scripts/browser-audit.cjs
          node --check enhancements/pacefold-hub.js
          node --check enhancements/inject.mjs
          node --check enhancements/hub-audit.cjs
      - name: Build and static audit
        run: |
          node _release/scripts/build.mjs _release
          node _release/scripts/validate.mjs _release
      - name: Browser application, action and installed-upgrade audit
        run: |
          npm install --prefix /tmp/pacefold-browser-audit playwright@1.61.1
          /tmp/pacefold-browser-audit/node_modules/.bin/playwright install --with-deps chromium
          NODE_PATH=/tmp/pacefold-browser-audit/node_modules node _release/scripts/browser-audit.cjs _release _previous
      - name: Inject and audit Hub surface
        id: hub_audit
        continue-on-error: true
        run: |
          status=0
          (
            set -euo pipefail
            node enhancements/inject.mjs _release
            test "$(cat _release/pacefold-hub-version.txt)" = "$(cat enhancements/VERSION)"
            grep -q 'data-pacefold-hub="15.3.0"' _release/index.html
            NODE_PATH=/tmp/pacefold-browser-audit/node_modules node enhancements/hub-audit.cjs _release
            node --check _release/service-worker.js
            node --check _release/app/service-worker.js
          ) > /tmp/pacefold-hub-audit.log 2>&1 || status=$?
          cat /tmp/pacefold-hub-audit.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Publish Hub audit diagnostic
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          HUB_STATUS: ${{ steps.hub_audit.outputs.status }}
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pacefold-hub-audit -->';
            const status = process.env.HUB_STATUS || 'unknown';
            const outcome = status === '0' ? 'success' : 'failure';
            let log = '';
            try { log = fs.readFileSync('/tmp/pacefold-hub-audit.log', 'utf8'); } catch {}
            const tail = log.slice(-7000).replace(/```/g, '``\\`');
            const body = `${marker}\n### Pacefold Hub audit: ${outcome}\n\n\`\`\`text\n${tail || 'No Hub audit output was captured.'}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
      - name: Require Hub audit success
        if: steps.hub_audit.outputs.status != '0'
        run: exit 1

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Reconstruct verified release and install Hub
        run: |
          cat release/pacefold-v15.zip.b64.part-* | base64 --decode > /tmp/pacefold-v15.zip
          echo "50c4c2787300102704d577e6e221909e307866522d59422d13871a55085d63e7  /tmp/pacefold-v15.zip" | sha256sum -c -
          mkdir _release _site
          unzip -q /tmp/pacefold-v15.zip -d _release
          node _release/scripts/build.mjs _release
          node _release/scripts/validate.mjs _release
          rsync -a _release/ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'scripts/' \
            --exclude 'README.md' \
            --exclude 'CHANGELOG.md' \
            --exclude 'REPOSITORY_SETUP.md' \
            --exclude 'SECURITY.md'
          node enhancements/inject.mjs _site
          test "$(cat _site/pacefold-hub-version.txt)" = "$(cat enhancements/VERSION)"
          grep -q 'data-pacefold-hub="15.3.0"' _site/index.html
          node --check _site/service-worker.js
          node --check _site/app/service-worker.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
